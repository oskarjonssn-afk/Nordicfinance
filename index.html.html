<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nordic Finance - Export</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="style.css">
    
    <script>
        // Tailwind konfiguration för att matcha appens tema
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        nordic: {
                            bg: '#0a0a0a',
                            card: '#141414',
                            border: '#262626',
                            text: '#f5f5f5',
                            muted: '#737373',
                            accent: '#1967d2'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-nordic-bg text-nordic-text font-['Inter',sans-serif]">
    <div class="flex min-h-screen">
        <!-- Sidebar och Main Content struktur (injektas via script eller finns statiskt) -->
        <!-- För en fullständig export rekommenderas att kopiera hela <body> från din nuvarande index.html -->
        <div id="app-root"></div> 
    </div>

    <script src="script.js"></script>
</body>
</html>
